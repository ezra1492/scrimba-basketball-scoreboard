<!doctype html>
<html lang="en">
  <!-- web page language -->

  <head>
    <meta charset="UTF-8" />
    <!-- loads of characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- proper display size based on user's device -->

    <link rel="stylesheet" href="index.css" />
    <!-- link's the HTML doc with CSS -->

    <link rel="icon" type="image/svg" sizes="32x32" href="./images/ball.svg" />
    <!-- basketball icon for the title from https://emojiterra.com/basketball/ -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap"
      rel="stylesheet"
    />
    <!-- title font -->
    <title>Basketball Scoreboard</title>
  </head>

  <body>
    <h1 hidden></h1>
    <!-- for readability all web pages must have an h1 tag -->
    <main class="scoreborad">
      <!-- main holds both HOME and GUEST cards -->
      <article class="scoreborad__team-card">
        <!-- each card lays within an article tag, and branches into title, score and buttons -->
        <h2 class="scoreboard__title">HOME</h2>

        <section
          class="scoreborad__dispaly"
          aria-label="Home team current score"
        >
          <data id="scoreborad__home-score" value="0">0</data>
        </section>

        <section class="scoreborad__buttons">
          <button class="scoreborad__btn" aria-label="Home team gets 1 pont">
            +1
          </button>
          <button class="scoreborad__btn" aria-label="Home team gets 2 ponts">
            +2
          </button>
          <button class="scoreborad__btn" aria-label="Home team gets 3 ponts">
            +3
          </button>
        </section>
      </article>

      <article class="scoreborad">
        <h2 class="scoreborad__title">GUEST</h2>

        <section
          class="scoreborad__display"
          aria-label="Guest team current score"
        >
          <data id="scoreborad__guest-score" value="0">0</data>
        </section>

        <section class="scoreborad__buttons">
          <button class="scoreborad__btn" aria-label="Guest team adds 1 pont">
            +1
          </button>
          <button class="scoreborad__btn" aria-label="Guest team adds 2 pont">
            +2
          </button>
          <button class="scoreborad__btn" aria-label="Guest team adds 3 pont">
            +3
          </button>
        </section>
      </article>
    </main>

    <script src="index.js"></script>
  </body>
</html>
